<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller</title>
    <style>
        body {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fefefe;
            color: #333333;
        }

        .card {
            padding: 20px;
        }

        h2 {
            color: #333333;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            flex: 1;
            padding: 12px;
            text-align: center;
            background-color: #d0d0d0;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #b0b0b0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            background-color: #d0d0d0;
            box-sizing: border-box;
            border: none;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        input[type="number"]:hover {
            background-color: #b0b0b0;
        }


        #result-display {
            font-size: 20px;
            border: 1px solid #d0d0d0;
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <h1>Controller</h1>

    <div class="card">
        <h2>Playing</h2>
        <div class="btn-group">
            <button type="button" class="btn" onclick="pause()">Pause</button>
            <button type="button" class="btn" onclick="resume()">Resume</button>
        </div>
    </div>

    <div class="card">
        <h2>Set volume to</h2>
        <div class="form-group">
            <label for="volume-value">Target volume</label>
            <input type="number" id="volume-value" step="0.05" min="0" max="1" placeholder="0.2">
        </div>
        <button type="button" class="btn"
            onclick="sendVolume({value: parseFloat(document.getElementById('volume-value').value)})">Set
            volume</button>
    </div>

    <div class="card">
        <h2>Change volume value</h2>
        <div class="form-group">
            <label for="volume-delta">Volume up or down by value</label>
            <input type="number" id="volume-delta" step="0.05" placeholder="0.1 for increase; -0.1 for decrease">
        </div>
        <button type="button" class="btn"
            onclick="sendVolume({delta: parseFloat(document.getElementById('volume-delta').value)})">Change
            volume</button>
    </div>

    <div class="card">
        <h2>Debug</h2>
        <pre id="result-display"></pre>
    </div>

    <script>
        const display = document.getElementById('result-display');

        async function pause() {
            try {
                const response = await fetch('/pause', { method: 'GET' })
                const data = await response.json()
                showResult('GET', '/pause', response.status, data);
            } catch (e) {
                showResult('GET', '/pause', '<null>', `Failed to GET /pause: ${e}`);
            }
        }

        async function resume() {
            try {
                const response = await fetch('/resume', { method: 'GET' })
                const data = await response.json()
                showResult('GET', '/resume', response.status, data);
            } catch (e) {
                showResult('GET', '/resume', '<null>', `Failed to GET /resume: ${e}`);
            }
        }

        async function sendVolume(payload) {
            if (payload.value !== undefined && isNaN(payload.value)) {
                return alert("invalid volume");
            }

            if (payload.delta !== undefined && isNaN(payload.delta)) {
                return alert("invalue volume");
            }

            try {
                const response = await fetch('/volume', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                showResult('POST', '/volume', response.status, data);
            } catch (err) {
                showResult('POST', '/volume', '<null>', `Failed to POST /volume: ${err}`);
            }
        }

        function showResult(method, route, statusCode, response) {
            display.textContent = `[${method} ${route} ${statusCode}]\n${JSON.stringify(response, null, 2)}`;
        }
    </script>

</body>

</html>
